name: english_practice_app
description: A Flutter app to practice English using Speech-to-Text and Text-to-Speech.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
